const {useState,useCallback,useRef,useEffect}=React;

/* ─── Mistral ──────────────────────────────────────────────────── */
async function callMistral(apiKey,prompt){
  const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:'mistral-large-latest',
      messages:[{role:'user',content:prompt}],
      temperature:0.05,
      response_format:{type:'json_object'},
      max_tokens:8192
    })
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`Mistral error ${r.status}`);}
  const d=await r.json();
  const raw=d.choices?.[0]?.message?.content||'{}';
  try{return JSON.parse(raw);}
  catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error('Could not parse JSON');}
}

/* ─── Backend detection ─────────────────────────────────────────── */
const IS_LOCAL = window.location.protocol !== 'file:';
const LOCAL_API = window.location.origin + '/api/analyze';

async function runAnalysisBackend(papers) {
  const res = await fetch(LOCAL_API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({papers: papers.map(p => ({name: p.name, text: p.text}))})
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || `Server error ${res.status}`);
  }
  return res.json();
}


/* ─── Expert Researcher-level prompt ────────────────────────────── */
function buildPrompt(papers){
  const maxChars=7500;
  const paperBlock=papers.map(p=>{
    const txt=p.text.length>maxChars?p.text.slice(0,maxChars)+'\n…[truncated]':p.text;
    return `\n${'═'.repeat(60)}\nPAPER ID: "${p.name}"\n${'═'.repeat(60)}\n${txt}`;
  }).join('\n\n');

  return `You are a senior researcher specialising in meta-science, reproducibility, and systematic gap analysis of AI/ML literature. Your task is to perform a rigorous uncertainty and research gap audit of the following papers — at the level expected in a leading research methodology workshop or a Nature/Science meta-review.

## ANALYTICAL FRAMEWORK

### Part A — Uncertainty Audit (per paper)
Analyse each paper for *epistemic uncertainty signals* across these categories:

**Hedging language:** may / might / could / possibly / perhaps / likely / seemingly / apparently  
**Soft claims:** suggest / indicate / appear / seem / imply  
**Scope limitations:** limited / preliminary / pilot / exploratory / initial  
**Explicit uncertainty:** unclear / unknown / uncertain / ambiguous / inconclusive  
**Knowledge boundaries:** "to the best of our knowledge" / "as far as we know"  
**Assumptions:** "we assume" / "we hypothesize" / "we conjecture"  
**Data weaknesses:** small sample (n<50) / synthetic data / single dataset / no held-out test set  
**Methodology gaps:** no ablation / no baseline / no statistical significance test / no replication  
**Generalisability concerns:** domain-specific / language-specific / task-specific claims  
**Explicit limitations:** self-identified limitations, caveats, drawbacks  

For each paper, assign a calibrated average_uncertainty score (0=certain/overconfident, 1=maximally hedged).

### Part B — Research Gap Taxonomy
Extract all research gap signals and classify into:

- **future_direction** — "future work will / should / could explore…"
- **open_question** — "it remains unclear / an open question is…"
- **unexplored** — "has not been explored / remains unexplored"
- **unstudied** — "to our knowledge, no prior work has addressed…"
- **data_gap** — "lack of benchmark / dataset / annotated corpus"
- **investigation_needed** — "further investigation / experiments are needed"
- **deferred_work** — "we leave X to future work"
- **promising_direction** — "a promising avenue / direction is…"
- **underexplored** — "underexplored / understudied / overlooked"
- **broad_impact_gap** — "broader implications remain unclear"

### Part C — Priority Scoring
Score each gap on three dimensions as a programme committee member would:

**Impact (0–1):** Scientific importance if resolved. Boost for: healthcare, safety, fairness, foundational models, missing benchmarks. Penalise for: incremental or narrow scope.
**Feasibility (0–1):** How tractable is this gap to address in a 12-month research project? Consider: data availability, compute requirements, methodological maturity.
**Novelty (0–1):** Uniqueness across the corpus. Is this gap raised by only one paper, or recurring? Penalise gaps that are over-represented; reward truly novel blind spots.

**Composite = Impact × 0.45 + Feasibility × 0.30 + Novelty × 0.25**

Priority tiers: >0.80 = 🔴 Critical, 0.70–0.80 = 🟠 High, 0.55–0.70 = 🟡 Medium, <0.55 = 🟢 Low

### Part D — Cross-Paper Conflict Detection
Compare uncertainty levels across papers. If two papers address overlapping topics but exhibit markedly different uncertainty levels (|Δ uncertainty| > 0.10), flag this as a credibility conflict — one paper may be over-confident, the other over-hedged.

## PAPERS TO ANALYSE:
${paperBlock}

## OUTPUT SCHEMA
Return ONLY valid JSON (no markdown fences, no preamble, no explanation outside the JSON):
{
  "paper_analyses": {
    "<paper_name>": {
      "avg_uncertainty": 0.44,
      "uncertainty_ratio": 0.38,
      "overconfidence_risk": "low|moderate|high",
      "dominant_uncertainty_types": {
        "epistemic_hedge": 6,
        "limitation": 4,
        "future_work": 3
      },
      "top_uncertain_sentences": [
        {
          "sentence": "exact or near-exact sentence from the paper",
          "uncertainty_score": 0.82,
          "types": ["epistemic_hedge", "scope_limit"],
          "aaai_note": "One sentence Expert reviewer observation about this uncertainty signal"
        }
      ],
      "gap_signals": [
        {
          "type": "future_direction",
          "trigger": "exact trigger phrase from paper",
          "sentence": "the full sentence containing the gap signal"
        }
      ],
      "methodology_concerns": ["brief specific concern 1", "brief specific concern 2"],
      "overconfident_claims": ["specific over-confident statement if any"]
    }
  },
  "research_gaps": [
    {
      "gap_id": "G001",
      "paper_source": "<paper_name>",
      "gap_type": "future_direction",
      "category": "Future Research Direction",
      "description": "the sentence or passage identifying the gap",
      "trigger_phrase": "exact trigger phrase",
      "impact_score": 0.90,
      "feasibility_score": 0.75,
      "novelty_score": 0.85,
      "composite_score": 0.848,
      "recommendation": "Specific, actionable 2-sentence research agenda item an Expert researcher could act on immediately.",
      "priority": "HIGH",
      "tier": "🔴 Critical",
      "aaai_framing": "How this gap would be framed in a research call for papers or workshop proposal"
    }
  ],
  "cross_paper_conflicts": [
    {
      "paper_1": "<paper_name>",
      "paper_2": "<paper_name>",
      "paper_1_uncertainty": 0.58,
      "paper_2_uncertainty": 0.18,
      "uncertainty_gap": 0.40,
      "topic_overlap": "brief description of the shared topic",
      "interpretation": "Expert-level interpretation of why the confidence levels diverge and what this implies for reproducibility or methodology",
      "severity": "HIGH|MEDIUM",
      "suggested_resolution": "What experiment or study would resolve this credibility conflict"
    }
  ],
  "summary": {
    "total_papers": 3,
    "total_gaps": 22,
    "critical_gaps": 5,
    "high_priority_gaps": 8,
    "medium_priority_gaps": 7,
    "low_priority_gaps": 2,
    "avg_uncertainty_overall": 0.41,
    "cross_paper_conflicts": 2,
    "top_gap_types": {
      "future_direction": 7,
      "open_question": 5,
      "data_gap": 4
    },
    "field_maturity_assessment": "3-4 sentence Expert-level judgement on the overall epistemic maturity of this research corpus — what does the pattern of uncertainty and gaps reveal about where the field stands?",
    "most_critical_gap": "Single most important gap across the entire corpus, framed as a Grand Research Challenge"
  }
}`;
}

/* ─── PDF / LaTeX extraction ────────────────────────────────────── */
async function extractText(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.pdf')){
    if(!window.pdfjsLib){
      await new Promise(res=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res();};
        document.head.appendChild(s);
      });
    }
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let out='';
    for(let i=1;i<=Math.min(pdf.numPages,40);i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      out+=tc.items.map(x=>x.str).join(' ')+'\n';
    }
    return out.replace(/\s{3,}/g,' ').trim();
  }
  const raw=await file.text();
  if(name.endsWith('.tex')){
    return raw
      .replace(/\\begin\{[^}]+\}[\s\S]*?\\end\{[^}]+\}/g,m=>
        m.replace(/\\[a-zA-Z]+\*?\{?[^}]*\}?/g,' '))
      .replace(/\$\$[\s\S]*?\$\$/g,' [eq] ')
      .replace(/\$[^$\n]{0,80}\$/g,' [eq] ')
      .replace(/\\[a-zA-Z]+\*?(\{([^}]*)\})?/g,' $2')
      .replace(/[{}\\%~]/g,' ').replace(/\s{2,}/g,' ').trim();
  }
  return raw.trim();
}
function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}
function fmtWords(t){return t.trim().split(/\s+/).length.toLocaleString();}

/* ─── Tier styles ────────────────────────────────────────────────── */
const TIER={
  'Critical':{bg:'var(--crit-bg)',color:'var(--crit)',border:'var(--crit-dim)',bar:'#991B1B'},
  'High':{bg:'var(--high-bg)',color:'var(--high)',border:'var(--high-dim)',bar:'#B45309'},
  'Medium':{bg:'var(--med-bg)',color:'var(--med)',border:'var(--med-dim)',bar:'#1D4ED8'},
  'Low':{bg:'var(--low-bg)',color:'var(--low)',border:'var(--low-dim)',bar:'#166534'},
};
function tierMeta(tier){
  for(const [k,v] of Object.entries(TIER)){if(tier?.includes(k))return v;}
  return{bg:'var(--surface2)',color:'var(--muted)',border:'var(--border)',bar:'var(--muted)'};
}
function prioMeta(p){
  return{HIGH:TIER.Critical,MEDIUM:TIER.Medium,LOW:TIER.Low,CRITICAL:TIER.Critical}[p]||TIER.Low;
}

/* ─── Atoms ─────────────────────────────────────────────────────── */
function TierBadge({tier,priority}){
  const m=tier?tierMeta(tier):prioMeta(priority);
  return(
    <span style={{background:m.bg,color:m.color,border:`1px solid ${m.border}`,
      borderRadius:4,fontSize:9,fontWeight:700,padding:'2px 8px',
      fontFamily:"'JetBrains Mono',monospace",letterSpacing:.08,textTransform:'uppercase'}}>
      {tier||priority}
    </span>
  );
}

function ProgBar({val,color,h=3}){
  return(
    <div style={{height:h,background:'var(--border)',borderRadius:h/2,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${Math.min((val||0)*100,100)}%`,
        background:color||'var(--accent)',borderRadius:h/2,transition:'width .5s ease'}}/>
    </div>
  );
}

function StatCard({label,value,color,sub}){
  return(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,
      padding:'16px 18px',boxShadow:'var(--shadow)'}}>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:30,fontWeight:700,
        color:color||'var(--text)',lineHeight:1,marginBottom:4}}>{value}</div>
      <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>{label}</div>
      {sub&&<div style={{fontSize:10,color:'var(--dim)',marginTop:2}}>{sub}</div>}
    </div>
  );
}

/* ─── Drop Zone ─────────────────────────────────────────────────── */
function DropZone({onFiles,disabled}){
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const handle=useCallback(async(files)=>{
    if(disabled)return;
    const arr=Array.from(files).filter(f=>/\.(pdf|tex|txt)$/i.test(f.name));
    if(arr.length)onFiles(arr);
  },[onFiles,disabled]);
  return(
    <div
      onClick={()=>!disabled&&ref.current?.click()}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files);}}
      style={{
        border:`1.5px dashed ${drag?'var(--accent)':'var(--border2)'}`,
        borderRadius:12,padding:'32px 24px',textAlign:'center',
        cursor:disabled?'not-allowed':'pointer',
        background:drag?'var(--accent-soft)':'var(--surface2)',
        transition:'all .18s',opacity:disabled?.55:1
      }}>
      <input ref={ref} type="file" accept=".pdf,.tex,.txt" multiple style={{display:'none'}}
        onChange={e=>handle(e.target.files)}/>
      <div style={{width:44,height:44,borderRadius:'50%',background:drag?'var(--accent-soft)':'var(--bg3)',
        display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',
        border:'1px solid var(--border2)',transition:'all .18s'}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke={drag?'var(--accent)':'var(--muted)'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div style={{fontSize:13,fontWeight:600,color:drag?'var(--accent)':'var(--text)',marginBottom:4}}>
        Drop papers here or <span style={{color:'var(--accent)'}}>browse</span>
      </div>
      <div style={{fontSize:11,color:'var(--dim)'}}>PDF · LaTeX (.tex) · Plain text — up to 40 pages per file</div>
    </div>
  );
}

function FileRow({paper,onRemove}){
  const ext=paper.name.split('.').pop().toUpperCase();
  const extStyle={PDF:{bg:'#FDF4E8',color:'var(--accent)'},TEX:{bg:'#F0FDF4',color:'var(--low)'},TXT:{bg:'var(--bg3)',color:'var(--muted)'}}[ext]||{bg:'var(--bg3)',color:'var(--muted)'};
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
      background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'var(--shadow)'}}>
      <span style={{background:extStyle.bg,color:extStyle.color,fontSize:9,fontWeight:700,
        padding:'2px 7px',borderRadius:4,fontFamily:"'JetBrains Mono',monospace",minWidth:30,textAlign:'center'}}>
        {ext}
      </span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:500,color:'var(--text)',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{paper.name}</div>
        <div style={{fontSize:10,color:'var(--dim)'}}>{fmtSize(paper.size)} · {fmtWords(paper.text)} words</div>
      </div>
      <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',flexShrink:0}}/>
      <button onClick={onRemove}
        style={{background:'none',border:'none',cursor:'pointer',color:'var(--dim)',
          fontSize:18,lineHeight:1,padding:'0 2px',borderRadius:4}}
        onMouseEnter={e=>e.currentTarget.style.color='var(--crit)'}
        onMouseLeave={e=>e.currentTarget.style.color='var(--dim)'}>×</button>
    </div>
  );
}

/* ─── Gap Card ───────────────────────────────────────────────────── */
function GapCard({gap,idx}){
  const [open,setOpen]=useState(false);
  const m=tierMeta(gap.tier);const pm=prioMeta(gap.priority);
  const bar=m.bar||pm.bar;
  return(
    <div style={{border:`1px solid ${open?'var(--accent-dim)':'var(--border)'}`,borderRadius:10,
      overflow:'hidden',background:'var(--surface)',boxShadow:open?'var(--shadow-lg)':'var(--shadow)',
      marginBottom:7,transition:'box-shadow .2s'}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{padding:'11px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10,
          background:open?'var(--bg2)':'var(--surface)'}}>
        <div style={{width:4,height:40,borderRadius:2,background:bar,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
            <TierBadge tier={gap.tier} priority={gap.priority}/>
            <span style={{fontSize:9,color:'var(--dim)',fontFamily:"'JetBrains Mono',monospace"}}>
              {gap.gap_id} · {gap.paper_source}
            </span>
          </div>
          <div style={{fontSize:11,color:'var(--accent)',fontWeight:600,marginBottom:2}}>{gap.category}</div>
          <div style={{fontSize:11,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',
            whiteSpace:'nowrap',lineHeight:1.4}}>{gap.description}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0,minWidth:52}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,
            color:bar,lineHeight:1}}>
            {((gap.composite_score||0)*100).toFixed(0)}
          </div>
          <div style={{fontSize:8,color:'var(--dim)',marginTop:2}}>composite</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" strokeWidth="2"
          style={{transform:open?'rotate(180deg)':'rotate(0)',transition:'transform .2s',flexShrink:0}}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      {open&&(
        <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
          {/* Score bars */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginTop:12,marginBottom:12}}>
            {[['Impact',gap.impact_score,'var(--crit)'],
              ['Feasibility',gap.feasibility_score,'var(--low)'],
              ['Novelty',gap.novelty_score,'var(--med)'],
              ['Composite',gap.composite_score,bar]].map(([l,v,c])=>(
              <div key={l}>
                <div style={{fontSize:9,color:'var(--dim)',marginBottom:3,letterSpacing:.06}}>{l.toUpperCase()}</div>
                <ProgBar val={v} color={c} h={4}/>
                <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:c,marginTop:3}}>
                  {((v||0)*100).toFixed(0)}%
                </div>
              </div>
            ))}
          </div>
          {gap.description&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:5}}>GAP STATEMENT</div>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',
                borderLeft:`3px solid ${bar}`,borderRadius:7,padding:'9px 12px',
                fontSize:12,color:'var(--text)',lineHeight:1.7,fontStyle:'italic'}}>
                "{gap.description}"
              </div>
            </div>
          )}
          {gap.trigger_phrase&&(
            <div style={{marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:9,color:'var(--dim)'}}>TRIGGER PHRASE:</span>
              <code style={{background:'var(--bg3)',color:'var(--accent)',fontSize:10,
                padding:'2px 7px',borderRadius:4,fontFamily:"'JetBrains Mono',monospace"}}>
                "{gap.trigger_phrase}"
              </code>
            </div>
          )}
          {gap.recommendation&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:5}}>RESEARCH RECOMMENDATION</div>
              <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',
                borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--ink)',lineHeight:1.65}}>
                {gap.recommendation}
              </div>
            </div>
          )}
          {gap.aaai_framing&&(
            <div>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:5}}>RESEARCH FRAMING</div>
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',
                borderRadius:7,padding:'9px 12px',fontSize:11,color:'var(--muted)',lineHeight:1.6,fontStyle:'italic'}}>
                {gap.aaai_framing}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Radial uncertainty SVG ─────────────────────────────────────── */
function UncertaintyRing({val,label,size=80}){
  const r=size*.38;const cx=size/2;const cy=size/2;
  const circ=2*Math.PI*r;
  const dash=val*circ;
  const col=val>0.6?'var(--crit)':val>0.4?'var(--high)':val>0.25?'var(--med)':'var(--low)';
  return(
    <div style={{textAlign:'center'}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth={4}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={4}
          strokeDasharray={`${dash} ${circ-dash}`}
          strokeDashoffset={circ*.25}
          strokeLinecap="round"/>
        <text x={cx} y={cy+2} textAnchor="middle" fontSize={size*.14} fill="var(--text)"
          fontFamily="'JetBrains Mono',monospace" fontWeight={700}>
          {(val*100).toFixed(0)}%
        </text>
      </svg>
      <div style={{fontSize:9,color:'var(--dim)',marginTop:-2}}>{label}</div>
    </div>
  );
}

                      <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:col,marginTop:3}}>

                </div>

                  <div style={{background:'var(--surface2)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--text)',
                    lineHeight:1.65,marginBottom:c.suggested_resolution?10:0}}>
                    {c.interpretation}
                  </div>
                )}

                  <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',
                    borderRadius:7,padding:'9px 12px',fontSize:11,color:'var(--ink)',lineHeight:1.6}}>
                    <strong style={{color:'var(--accent)'}}>Suggested resolution:</strong> {c.suggested_resolution}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── App ───────────────────────────────────────────────────────── */
function App(){
  const [apiKey,setApiKey]=useState('');
  const [showKey,setShowKey]=useState(false);
  const [papers,setPapers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('');
  const [progress,setProgress]=useState(0);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');

  const handleFiles=useCallback(async(files)=>{
    for(const file of files){
      setStatus(`Extracting text from ${file.name}…`);
      try{
        const text=await extractText(file);
        setPapers(p=>[...p.filter(x=>x.name!==file.name),{name:file.name,text,size:file.size}]);
      }catch(e){setError(`Failed to read ${file.name}: ${e.message}`);}
    }
    setStatus('');
  },[]);

  const runAnalysis=async()=>{
    if(!IS_LOCAL && !apiKey.trim()){setError('Please enter your Mistral API key.');return;}
    if(papers.length<1){setError('Please upload at least 1 paper to analyse.');return;}
    setLoading(true);setError('');setResult(null);setProgress(0);
    try{
      if(IS_LOCAL){
        setStatus('Running Python backend uncertainty audit…');setProgress(20);
        const res=await runAnalysisBackend(papers);
        setProgress(90);
        setResult(res);setStatus('Analysis complete.');setProgress(100);
        setTimeout(()=>{setStatus('');setProgress(0);},2000);
      } else {
        setStatus('Constructing expert-level uncertainty audit prompt…');setProgress(15);
        setStatus('Sending to Mistral AI (mistral-large-latest)…');setProgress(35);
        const prompt=buildPrompt(papers);
        setProgress(50);
        const res=await callMistral(apiKey.trim(),prompt);
        setProgress(90);
        setResult(res);setStatus('Analysis complete.');setProgress(100);
        setTimeout(()=>{setStatus('');setProgress(0);},2000);
      }
    }catch(e){
      setError(e.message);setStatus('');setProgress(0);
    }finally{setLoading(false);}
  };

  const keyOk=apiKey.length>20;

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <style>{`
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .fade-up{animation:fadeUp .3s ease both}
        button:not(:disabled):hover{opacity:.85}
      `}</style>

      {/* Header */}
      <header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',
        padding:'0 28px',boxShadow:'0 1px 4px rgba(26,24,20,.06)'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:0,padding:'14px 0 10px'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                <span style={{fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:700,
                  color:'var(--text)',letterSpacing:-.3}}>Agent 5</span>
                <span style={{width:1,height:16,background:'var(--border)',display:'inline-block'}}/>
                <span style={{fontSize:14,color:'var(--muted)',fontWeight:400}}>
                  Uncertainty & Research Gap Analyst
                </span>
                <span style={{background:'var(--accent-soft)',color:'var(--accent)',fontSize:9,
                  fontWeight:600,padding:'2px 8px',borderRadius:4,
                  fontFamily:"'JetBrains Mono',monospace",letterSpacing:.06}}>Expert</span>
              </div>
              <div style={{fontSize:10,color:'var(--dim)',marginTop:2}}>
                Uncertainty audit · Gap taxonomy · Priority scoring (Impact × Feasibility × Novelty) · Conflict detection
              </div>
            </div>
            {/* Key / Backend Mode */}
            {IS_LOCAL ? (
              <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--low-bg)',
                border:'1px solid var(--low-dim)',borderRadius:8,padding:'6px 14px'}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:'var(--low)',
                  boxShadow:'0 0 6px var(--low-dim)'}}/>
                <span style={{fontSize:11,color:'var(--low)',fontWeight:600,
                  fontFamily:"'JetBrains Mono',monospace"}}>LOCAL PYTHON BACKEND</span>
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Mistral API Key</label>
                <div style={{display:'flex',background:'var(--surface2)',border:'1px solid var(--border)',
                  borderRadius:8,overflow:'hidden',...(keyOk?{borderColor:'var(--low-dim)'}:{})}}>
                  <input type={showKey?'text':'password'} value={apiKey}
                    onChange={e=>setApiKey(e.target.value)}
                    placeholder="Enter key…"
                    style={{background:'none',border:'none',padding:'7px 12px',color:'var(--text)',
                      fontSize:12,fontFamily:"'JetBrains Mono',monospace",outline:'none',width:220}}/>
                  <button onClick={()=>setShowKey(s=>!s)}
                    style={{background:'none',border:'none',borderLeft:'1px solid var(--border)',
                      color:'var(--dim)',cursor:'pointer',padding:'0 10px',fontSize:13}}>
                    {showKey?'●':'○'}
                  </button>
                </div>
                <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                  background:keyOk?'var(--low)':'#d1d5db',
                  boxShadow:keyOk?'0 0 6px var(--low-dim)':'none',transition:'all .3s'}}/>
              </div>
            )}
          </div>
          {progress>0&&(
            <div style={{height:2,background:'var(--bg3)',borderRadius:1,marginBottom:2}}>
              <div style={{height:'100%',background:'var(--accent)',borderRadius:1,
                width:`${progress}%`,transition:'width .4s ease'}}/>
            </div>
          )}
        </div>
      </header>

      {/* Body */}
      <main style={{flex:1,maxWidth:1100,margin:'0 auto',width:'100%',padding:'24px 28px'}}>
        <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:20,alignItems:'start'}}>

          {/* Left */}
          <div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,
              padding:'20px',boxShadow:'var(--shadow)',marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',letterSpacing:.08,marginBottom:12}}>
                UPLOAD PAPERS

              {papers.length>0&&(
                <div style={{marginTop:12}}>
                  <div style={{fontSize:10,color:'var(--dim)',marginBottom:6,letterSpacing:.06}}>
                    {papers.length} paper{papers.length!==1?'s':''} loaded
                  </div>
                  {papers.map(p=>(
                    <FileRow key={p.name} paper={p}
                      onRemove={()=>setPapers(ps=>ps.filter(x=>x.name!==p.name))}/>
                  ))}
                </div>
              )}
              <div style={{marginTop:14,background:'var(--bg2)',border:'1px solid var(--border)',
                borderRadius:8,padding:'9px 12px',fontSize:10,color:'var(--dim)',lineHeight:1.6}}>
                <strong style={{color:'var(--muted)'}}>Supports:</strong> PDF (up to 40 pages), LaTeX (.tex), plain text. Files parsed locally — only text sent to Mistral AI. Works with 1 or more papers.
              </div>
            </div>

            {status&&(
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',
                background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',borderRadius:8,
                fontSize:11,color:'var(--accent)',marginBottom:12}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  strokeWidth="2" style={{animation:'spin 1s linear infinite',flexShrink:0}}>
                  <path d="M21 12a9 9 0 11-6.219-8.56"/>
                </svg>
                {status}
              </div>
            )}
            {error&&(
              <div style={{padding:'10px 14px',background:'var(--crit-bg)',
                border:'1px solid var(--crit-dim)',borderRadius:8,
                fontSize:11,color:'var(--crit)',lineHeight:1.55,marginBottom:12}}>
                <strong>Error:</strong> {error}
              </div>
            )}

            <button onClick={runAnalysis} disabled={loading||papers.length<1||(!IS_LOCAL&&!keyOk)}
              style={{width:'100%',padding:'13px',
                background:loading||(!IS_LOCAL&&!keyOk)||papers.length<1?'var(--bg3)':'var(--accent)',
                color:loading||(!IS_LOCAL&&!keyOk)||papers.length<1?'var(--dim)':'#fff',
                border:'none',borderRadius:10,fontSize:13,fontWeight:600,
                cursor:loading||papers.length<1||(!IS_LOCAL&&!keyOk)?'not-allowed':'pointer',
                transition:'all .2s',
                boxShadow:(IS_LOCAL||keyOk)&&papers.length>=1&&!loading?'0 2px 12px rgba(124,58,0,.2)':'none',
                letterSpacing:.02}}>
              {loading?'Analysing…':papers.length<1?'Upload Papers First':`Run Uncertainty Audit · ${papers.length} Paper${papers.length!==1?'s':''}`}
            </button>

            <div style={{marginTop:12,background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:10,padding:'12px 14px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:8}}>AGENT CAPABILITIES</div>
              {[
                ['Uncertainty Audit','30+ epistemic signal patterns per paper'],
                ['Gap Taxonomy','10 gap types with trigger phrase detection'],
                ['Priority Scoring','Impact × Feasibility × Novelty composite'],
                ['Priority Tiers','🔴 Critical · 🟠 High · 🟡 Medium · 🟢 Low'],
                ['Expert Framing','Gaps phrased as actionable research challenges'],
                ['Conflict Detection','Cross-paper uncertainty credibility analysis'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',gap:8,marginBottom:6,fontSize:11}}>
                  <div style={{width:4,height:4,borderRadius:'50%',background:'var(--accent)',
                    marginTop:4,flexShrink:0}}/>
                  <span><strong style={{color:'var(--text)'}}>{k}</strong>
                    <span style={{color:'var(--muted)'}}> — {v}</span></span>
                </div>
              ))}
            </div>
          </div>

          {/* Right */}
          <div>
            {!result&&!loading&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                minHeight:400,background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:14,boxShadow:'var(--shadow)',padding:40,textAlign:'center'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg3)',
                  display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" strokeWidth="1.5">
                    <path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/><path d="M12 8v4"/><circle cx="12" cy="16" r="1"/>
                  </svg>
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:20,color:'var(--text)',marginBottom:8}}>
                  Ready to Audit
                </div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.7,maxWidth:340}}>
                  Upload research papers to detect uncertainty signals, classify research gaps by type, and prioritise them using the standard Impact × Feasibility × Novelty framework.
                </div>
              </div>
            )}
            {loading&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                minHeight:400,background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:14,boxShadow:'var(--shadow)',padding:40}}>
                <div style={{width:52,height:52,border:'2px solid var(--border)',
                  borderTop:'2px solid var(--accent)',borderRadius:'50%',
                  animation:'spin 1s linear infinite',marginBottom:20}}/>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:16,color:'var(--text)',marginBottom:6}}>
                  {status||'Auditing…'}
                </div>
                <div style={{fontSize:11,color:'var(--dim)'}}>
                  Mistral is performing expert-level uncertainty and gap analysis
                </div>
              </div>
            )}
            {result&&<div className="fade-up"><Results result={result}/></div>}
          </div>
        </div>
      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'10px 28px',
        background:'var(--surface)',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:"'Fraunces',serif",fontSize:12,color:'var(--muted)'}}>Agent 5</span>
        <span style={{fontSize:11,color:'var(--dim)'}}>— Uncertainty & Research Gap Analyst · Research Intelligence System · Powered by Mistral AI</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
