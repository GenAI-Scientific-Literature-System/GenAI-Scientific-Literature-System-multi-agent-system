<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--bg2:#FDFCF9;--bg3:#EDEAE2;
  --surface:#FFFFFF;--surface2:#F8F6F1;
  --border:#DDD8CC;--border2:#C8C2B4;
  --text:#1C1A16;--muted:#6B6456;--dim:#9E9688;
  --ink:#2B2820;
  --accent:#1D3A6E;--accent2:#2B52A0;--accent-soft:#EBF0FA;--accent-dim:#B8C8E8;
  --agree:#1A5C38;--agree-bg:#EDFBF3;--agree-dim:#A3D9BC;
  --contra:#8B1A1A;--contra-bg:#FDF0F0;--contra-dim:#E8B3B3;
  --partial:#7A5C0A;--partial-bg:#FDF8EC;--partial-dim:#E2D09A;
  --novel:#2C4A7A;--novel-bg:#EFF4FD;--novel-dim:#ADC4E8;

html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.6}

input,button,select{font-family:inherit}

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

/* ─── Mistral call ─────────────────────────────────────────────── */
async function callMistral(apiKey,prompt){
  const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:'mistral-large-latest',
      messages:[{role:'user',content:prompt}],
      temperature:0.05,
      response_format:{type:'json_object'},
      max_tokens:8192
    })
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`Mistral API error ${r.status}`);}
  const d=await r.json();
  const raw=d.choices?.[0]?.message?.content||'{}';
  try{return JSON.parse(raw);}
  catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error('Could not parse JSON response');}
}

/* ─── Backend detection ─────────────────────────────────────────── */
const IS_LOCAL = window.location.protocol !== 'file:';
const LOCAL_API = window.location.origin + '/api/analyze';

async function runAnalysisBackend(papers) {
  const res = await fetch(LOCAL_API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({papers: papers.map(p => ({name: p.name, text: p.text}))})
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || `Server error ${res.status}`);
  }
  return res.json();
}


/* ─── Expert Researcher-level prompt ────────────────────────────── */
function buildPrompt(papers){
  const maxChars=7500;
  const paperBlock=papers.map(p=>{
    const txt=p.text.length>maxChars?p.text.slice(0,maxChars)+'\n…[truncated for context window]':p.text;
    return `\n${'═'.repeat(60)}\nPAPER ID: "${p.name}"\n${'═'.repeat(60)}\n${txt}`;
  }).join('\n\n');

  return `You are an expert researcher and peer reviewer with deep expertise in analysing scientific literature. Your task is to perform a rigorous, structured inter-paper claim analysis as would appear in a top-tier systematic review.

## ANALYTICAL FRAMEWORK

### Step 1 — Claim Extraction (per paper)
For each paper, extract 8–12 *primary claims*. Prioritise:
- Empirical findings with quantitative evidence (accuracy, F1, BLEU, perplexity, etc.)
- Methodological contributions (novel architectures, training regimes, objectives)
- Theoretical assertions (properties, convergence guarantees, limitations)
- Comparative statements vs. baselines or prior art
- Scope/generalisability assertions

### Step 2 — Cross-Paper Relational Analysis
For every meaningful claim pair across papers, classify the epistemological relationship:
- **agreement** — both papers provide converging evidence for the same proposition. Confidence > 0.70 requires shared empirical grounding or theoretical derivation.
- **contradiction** — papers reach mutually exclusive conclusions on the same proposition. Look for: opposing performance claims, conflicting theoretical positions, contradictory ablation findings.
- **partial** — overlapping domain or methodology but differing in scope, dataset, task, or framing. Neither confirms nor refutes; requires reconciliation.
- **novel** — a claim unique to one paper with no counterpart in the corpus. Represents a frontier contribution.

### Step 3 — Research Gap Inference
For each pair, identify what *further empirical or theoretical work* is needed to resolve the relationship — framed as a specific, actionable research agenda item.

### Step 4 — Corpus-Level Synthesis
Synthesise the overall epistemic landscape of this paper corpus: What is the field converging on? Where are the fracture lines? What is the highest-impact open problem?

## PAPERS TO ANALYSE:
${paperBlock}

## OUTPUT SCHEMA
Return ONLY a valid JSON object (no markdown fences, no preamble):
{
  "claims_by_paper": {
    "<paper_name>": [
      "Precise, verbatim-grounded claim statement with evidence anchor"
    ]
  },
  "comparisons": [
    {
      "claim": "The core proposition being compared across papers",
      "papers": ["<paper_name_1>", "<paper_name_2>"],
      "relationship": "agreement|contradiction|partial|novel",
      "confidence": 0.87,
      "evidence": [
        "Supporting excerpt or paraphrase from paper 1 (max 120 chars)",
        "Supporting excerpt or paraphrase from paper 2 (max 120 chars)"
      ],
      "claim1_category": "performance|methodology|finding|contrast|limitation|theoretical",
      "claim2_category": "performance|methodology|finding|contrast|limitation|theoretical",
      "semantic_similarity": 0.74,
      "explanation": "Rigorous 2–3 sentence expert-level reasoning for this classification, citing specific evidence.",
      "research_gap": "Specific, actionable research agenda item to resolve or build upon this relationship (1–2 sentences)."
    }
  ],
  "summary": {
    "total_comparisons": 24,
    "agreement_count": 7,
    "contradiction_count": 8,
    "partial_count": 6,
    "novel_count": 3,
    "agreement_ratio": 0.292,
    "contradiction_ratio": 0.333,
    "avg_confidence": 0.76,
    "corpus_synthesis": "3–4 sentence high-quality synthesis of the epistemic landscape across all papers.",
    "highest_impact_open_problem": "The single most important unresolved question this corpus raises, framed as a research challenge."
  }
}`;
}

/* ─── PDF / LaTeX text extraction ─────────────────────────────── */
async function extractText(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.pdf')){
    if(!window.pdfjsLib){
      await new Promise(res=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res();};
        document.head.appendChild(s);
      });
    }
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let out='';
    for(let i=1;i<=Math.min(pdf.numPages,40);i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      out+=tc.items.map(x=>x.str).join(' ')+'\n';
    }
    return out.replace(/\s{3,}/g,' ').trim();
  }
  const raw=await file.text();
  if(name.endsWith('.tex')){
    return raw
      .replace(/\\begin\{[^}]+\}[\s\S]*?\\end\{[^}]+\}/g,m=>
        m.replace(/\\[a-zA-Z]+\*?\{?[^}]*\}?/g,' '))
      .replace(/\$\$[\s\S]*?\$\$/g,' [equation] ')
      .replace(/\$[^$\n]{0,80}\$/g,' [eq] ')
      .replace(/\\[a-zA-Z]+\*?(\{([^}]*)\})?/g,' $2')
      .replace(/[{}\\%~]/g,' ').replace(/\s{2,}/g,' ').trim();
  }
  return raw.trim();
}

function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}
function fmtWords(t){return t.trim().split(/\s+/).length.toLocaleString();}

/* ─── UI Atoms ─────────────────────────────────────────────────── */
const REL_META={
  agreement:{label:'Agreement',bg:'var(--agree-bg)',color:'var(--agree)',border:'var(--agree-dim)',dot:'#1A5C38'},
  contradiction:{label:'Contradiction',bg:'var(--contra-bg)',color:'var(--contra)',border:'var(--contra-dim)',dot:'#8B1A1A'},
  partial:{label:'Partial',bg:'var(--partial-bg)',color:'var(--partial)',border:'var(--partial-dim)',dot:'#7A5C0A'},
  novel:{label:'Novel',bg:'var(--novel-bg)',color:'var(--novel)',border:'var(--novel-dim)',dot:'#2C4A7A'},
};

function RelChip({type,size='sm'}){
  const m=REL_META[type]||{label:type,bg:'#f5f5f5',color:'#555',border:'#ccc'};
  const fs=size==='lg'?11:9;
  return(
    <span style={{background:m.bg,color:m.color,border:`1px solid ${m.border}`,
      borderRadius:4,fontSize:fs,fontWeight:600,padding:`${size==='lg'?4:2}px ${size==='lg'?10:7}px`,
      letterSpacing:.06,display:'inline-block',fontFamily:"'DM Mono',monospace",textTransform:'uppercase'}}>
      {m.label}
    </span>
  );
}

function Pill({label,color,bg}){
  return(
    <span style={{background:bg||'var(--accent-soft)',color:color||'var(--accent)',
      borderRadius:20,fontSize:9,fontWeight:600,padding:'2px 9px',
      fontFamily:"'DM Mono',monospace",letterSpacing:.08,display:'inline-block'}}>
      {label}
    </span>
  );
}

function ConfBar({val,color}){
  const col=color||'var(--accent)';
  return(
    <div style={{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${Math.min((val||0)*100,100)}%`,
        background:col,borderRadius:2,transition:'width .5s ease'}}/>
    </div>
  );
}

function StatCard({label,value,color,sub}){
  return(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,
      padding:'16px 18px',boxShadow:'var(--shadow)'}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,
        color:color||'var(--text)',lineHeight:1,marginBottom:4}}>{value}</div>
      <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>{label}</div>
      {sub&&<div style={{fontSize:10,color:'var(--dim)',marginTop:2}}>{sub}</div>}
    </div>
  );
}

/* ─── Drop Zone ─────────────────────────────────────────────────── */
function DropZone({onFiles,disabled}){
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const handle=useCallback(async(files)=>{
    if(disabled)return;
    const arr=Array.from(files).filter(f=>/\.(pdf|tex|txt)$/i.test(f.name));
    if(arr.length)onFiles(arr);
  },[onFiles,disabled]);
  return(
    <div
      onClick={()=>!disabled&&ref.current?.click()}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files);}}
      style={{
        border:`1.5px dashed ${drag?'var(--accent)':'var(--border2)'}`,
        borderRadius:12,padding:'32px 24px',textAlign:'center',
        cursor:disabled?'not-allowed':'pointer',
        background:drag?'var(--accent-soft)':'var(--surface2)',
        transition:'all .18s',opacity:disabled?.55:1
      }}>
      <input ref={ref} type="file" accept=".pdf,.tex,.txt" multiple style={{display:'none'}}
        onChange={e=>handle(e.target.files)}/>
      <div style={{width:44,height:44,borderRadius:'50%',background:drag?'var(--accent-soft)':'var(--bg3)',
        display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',
        border:'1px solid var(--border2)',transition:'all .18s'}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={drag?'var(--accent)':'var(--muted)'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div style={{fontSize:13,fontWeight:600,color:drag?'var(--accent)':'var(--text)',marginBottom:4}}>
        Drop papers here or <span style={{color:'var(--accent)'}}>browse</span>
      </div>
      <div style={{fontSize:11,color:'var(--dim)'}}>PDF · LaTeX (.tex) · Plain text — up to 40 pages per file</div>
    </div>
  );
}

/* ─── File Row ──────────────────────────────────────────────────── */
function FileRow({paper,onRemove}){
  const ext=paper.name.split('.').pop().toUpperCase();
  const extStyle={
    PDF:{bg:'#EBF0FA',color:'var(--accent)'},
    TEX:{bg:'#EDFBF3',color:'var(--agree)'},
    TXT:{bg:'var(--bg3)',color:'var(--muted)'}
  }[ext]||{bg:'var(--bg3)',color:'var(--muted)'};
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
      background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
      boxShadow:'var(--shadow)'}}>
      <span style={{background:extStyle.bg,color:extStyle.color,fontSize:9,fontWeight:700,
        padding:'2px 7px',borderRadius:4,fontFamily:"'DM Mono',monospace",minWidth:30,textAlign:'center'}}>
        {ext}
      </span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:500,color:'var(--text)',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{paper.name}</div>
        <div style={{fontSize:10,color:'var(--dim)'}}>{fmtSize(paper.size)} · {fmtWords(paper.text)} words</div>
      </div>
      <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',flexShrink:0}}/>
      <button onClick={onRemove}
        style={{background:'none',border:'none',cursor:'pointer',color:'var(--dim)',
          fontSize:18,lineHeight:1,padding:'0 2px',borderRadius:4,display:'flex',
          alignItems:'center',justifyContent:'center'}}
        onMouseEnter={e=>e.currentTarget.style.color='var(--contra)'}
        onMouseLeave={e=>e.currentTarget.style.color='var(--dim)'}>
        ×
      </button>
    </div>
  );
}

/* ─── Comparison Card ──────────────────────────────────────────── */
function CompCard({comp,idx}){
  const [open,setOpen]=useState(false);
  const m=REL_META[comp.relationship]||REL_META.novel;
  const cats={
    performance:'🎯',methodology:'⚙️',finding:'🔍',
    contrast:'↔️',limitation:'⚠️',theoretical:'📐',general:'📌'
  };
  return(
    <div style={{border:`1px solid ${open?'var(--accent-dim)':'var(--border)'}`,borderRadius:10,
      overflow:'hidden',background:'var(--surface)',boxShadow:open?'var(--shadow-lg)':'var(--shadow)',
      transition:'box-shadow .2s',marginBottom:8}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:'11px 14px',cursor:'pointer',
        display:'flex',alignItems:'center',gap:10,
        background:open?'var(--bg2)':'var(--surface)'}}>
        <div style={{width:4,height:36,borderRadius:2,background:m.dot,flexShrink:0}}/>
        <RelChip type={comp.relationship}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:500,color:'var(--text)',overflow:'hidden',
            textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.4}}>
            {comp.claim}
          </div>
          <div style={{fontSize:10,color:'var(--dim)',marginTop:2,fontFamily:"'DM Mono',monospace"}}>
            {comp.papers?.join(' ↔ ')}
          </div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--accent)',fontFamily:"'DM Mono',monospace"}}>
            {Math.round((comp.confidence||0)*100)}%
          </div>
          <div style={{fontSize:9,color:'var(--dim)'}}>conf.</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" strokeWidth="2"
          style={{transform:open?'rotate(180deg)':'rotate(0)',transition:'transform .2s',flexShrink:0}}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      {open&&(
        <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:12,marginBottom:10}}>
            <div>
              <div style={{fontSize:9,color:'var(--dim)',marginBottom:4,letterSpacing:.08}}>CONFIDENCE SCORE</div>
              <ConfBar val={comp.confidence||0} color={m.dot}/>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:3,fontFamily:"'DM Mono',monospace"}}>
                {((comp.confidence||0)*100).toFixed(1)}%
              </div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--dim)',marginBottom:4,letterSpacing:.08}}>SEMANTIC SIMILARITY</div>
              <ConfBar val={comp.semantic_similarity||0} color='var(--accent2)'/>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:3,fontFamily:"'DM Mono',monospace"}}>
                {((comp.semantic_similarity||0)*100).toFixed(1)}%
              </div>
            </div>
          </div>

          {comp.claim1_category&&comp.claim2_category&&(
            <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
              <span style={{fontSize:10,color:'var(--muted)'}}>
                {cats[comp.claim1_category]||'📌'} {comp.claim1_category}
              </span>
              <span style={{color:'var(--dim)'}}>→</span>
              <span style={{fontSize:10,color:'var(--muted)'}}>
                {cats[comp.claim2_category]||'📌'} {comp.claim2_category}
              </span>
            </div>
          )}

          {(comp.evidence||[]).filter(Boolean).length>0&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:5}}>TEXTUAL EVIDENCE</div>
              {comp.evidence.filter(Boolean).map((ev,j)=>(
                <div key={j} style={{background:'var(--surface2)',border:'1px solid var(--border)',
                  borderLeft:`3px solid ${j===0?'var(--accent)':'var(--border2)'}`,
                  borderRadius:6,padding:'7px 10px',fontSize:11,color:'var(--muted)',
                  lineHeight:1.55,marginBottom:4,fontStyle:'italic'}}>
                  "{ev}"
                </div>
              ))}
            </div>
          )}

          {comp.explanation&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:5}}>ANALYTICAL REASONING</div>
              <div style={{fontSize:12,color:'var(--text)',lineHeight:1.7,background:'var(--bg2)',
                border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px'}}>
                {comp.explanation}
              </div>
            </div>
          )}

          {comp.research_gap&&(
            <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',
              borderRadius:8,padding:'9px 12px'}}>
              <div style={{fontSize:9,color:'var(--accent)',fontWeight:600,letterSpacing:.08,marginBottom:4}}>
                RESEARCH AGENDA ITEM
              </div>
              <div style={{fontSize:11,color:'var(--ink)',lineHeight:1.6}}>{comp.research_gap}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Mini Donut SVG ────────────────────────────────────────────── */
function Donut({s}){
  const data=[
    {v:s.agreement_count||0,c:'var(--agree)'},
    {v:s.contradiction_count||0,c:'var(--contra)'},
    {v:s.partial_count||0,c:'var(--partial)'},
    {v:s.novel_count||0,c:'var(--novel)'},
  ];
  const total=data.reduce((a,d)=>a+d.v,0)||1;
  const R=52,r=32,cx=60,cy=60;
  let start=0;
  const polar=(deg)=>{const rad=deg*Math.PI/180;return[cx+R*Math.cos(rad),cy+R*Math.sin(rad)];};
  const slices=data.map(d=>{
    const sweep=(d.v/total)*360;
    const p={start,sweep,v:d.v,c:d.c};
    start+=sweep;return p;
  });
  function arc({start:s,sweep}){
    if(sweep>=359.9)return`M${cx+R},${cy} A${R},${R},0,1,1,${cx+R-.001},${cy}Z`;
    const s1=polar(s-90),e1=polar(s+sweep-90),l=sweep>180?1:0;
    return`M${cx},${cy} L${s1[0]},${s1[1]} A${R},${R},0,${l},1,${e1[0]},${e1[1]}Z`;
  }
  return(
    <div style={{display:'flex',alignItems:'center',gap:24}}>
      <svg width={120} height={120} viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={R} fill="var(--bg3)"/>
        {slices.map((sl,i)=>sl.sweep>0.5&&(
          <path key={i} d={arc(sl)} fill={sl.c} opacity={.85}/>
        ))}
        <circle cx={cx} cy={cy} r={r} fill="var(--surface)"/>
        <text x={cx} y={cy-4} textAnchor="middle" fontSize={14} fill="var(--text)"
          fontFamily="'Playfair Display',serif" fontWeight={700}>{total}</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize={8} fill="var(--dim)"
          fontFamily="'DM Mono',monospace">PAIRS</text>
      </svg>
      <div style={{flex:1}}>
        {[['Agreement',s.agreement_count,'var(--agree)'],
          ['Contradiction',s.contradiction_count,'var(--contra)'],
          ['Partial',s.partial_count,'var(--partial)'],
          ['Novel',s.novel_count,'var(--novel)']].map(([l,v,c])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
            <div style={{width:8,height:8,borderRadius:2,background:c,flexShrink:0}}/>
            <span style={{fontSize:11,color:'var(--muted)',flex:1}}>{l}</span>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text)',fontFamily:"'DM Mono',monospace"}}>{v||0}</span>
            <span style={{fontSize:10,color:'var(--dim)',minWidth:32,textAlign:'right',fontFamily:"'DM Mono',monospace"}}>
              {total>0?((v||0)/total*100).toFixed(0):0}%
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── Results ───────────────────────────────────────────────────── */
function Results({result}){
  const [tab,setTab]=useState('overview');
  const [relFilter,setRelFilter]=useState(['agreement','contradiction','partial','novel']);
  const s=result.summary||{};
  const comps=result.comparisons||[];
  const byPaper=result.claims_by_paper||{};
  const tabs=[['overview','Overview'],['claims','Claims'],['explorer','Explorer'],['insights','Insights']];
  const filtered=comps.filter(c=>relFilter.includes(c.relationship));
  const toggle=r=>setRelFilter(f=>f.includes(r)?f.filter(x=>x!==r):[...f,r]);

  return(
    <div style={{marginTop:24}}>
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:16,
        borderBottom:'1px solid var(--border)',paddingBottom:12}}>
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{background:tab===k?'var(--accent)':'none',
              color:tab===k?'#fff':'var(--muted)',
              border:`1px solid ${tab===k?'var(--accent)':'var(--border)'}`,
              borderRadius:6,padding:'5px 14px',fontSize:11,cursor:'pointer',
              fontWeight:tab===k?600:400,transition:'all .15s'}}>
            {l}
          </button>
        ))}
        <span style={{marginLeft:'auto',fontSize:10,color:'var(--dim)',
          fontFamily:"'DM Mono',monospace"}}>
          {comps.length} comparisons
        </span>
      </div>

      {tab==='overview'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
            <StatCard label="Agreements" value={s.agreement_count??0} color="var(--agree)"/>
            <StatCard label="Contradictions" value={s.contradiction_count??0} color="var(--contra)"/>
            <StatCard label="Partial" value={s.partial_count??0} color="var(--partial)"/>
            <StatCard label="Novel Claims" value={s.novel_count??0} color="var(--novel)"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            <StatCard label="Average Confidence" value={`${((s.avg_confidence||0)*100).toFixed(1)}%`} color="var(--accent)" sub="across all claim pairs"/>
            <StatCard label="Contradiction Rate" value={`${((s.contradiction_ratio||0)*100).toFixed(1)}%`} color="var(--contra)" sub="of total comparisons"/>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
            padding:'18px 20px',boxShadow:'var(--shadow)',marginBottom:12}}>
            <div style={{fontSize:10,color:'var(--dim)',letterSpacing:.08,marginBottom:12,fontWeight:500}}>
              RELATIONSHIP DISTRIBUTION
            </div>
            <Donut s={s}/>
          </div>
          {s.corpus_synthesis&&(
            <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',
              borderRadius:12,padding:'16px 18px'}}>
              <div style={{fontSize:10,color:'var(--accent)',fontWeight:600,letterSpacing:.08,marginBottom:8}}>
                CORPUS-LEVEL SYNTHESIS
              </div>
              <div style={{fontSize:12,color:'var(--ink)',lineHeight:1.75,fontStyle:'italic',
                fontFamily:"'Playfair Display',serif"}}>
                {s.corpus_synthesis}
              </div>
            </div>
          )}
          {s.highest_impact_open_problem&&(
            <div style={{background:'var(--contra-bg)',border:'1px solid var(--contra-dim)',
              borderRadius:12,padding:'14px 16px',marginTop:10}}>
              <div style={{fontSize:10,color:'var(--contra)',fontWeight:600,letterSpacing:.08,marginBottom:6}}>
                HIGHEST-IMPACT OPEN PROBLEM
              </div>
              <div style={{fontSize:12,color:'var(--ink)',lineHeight:1.65}}>{s.highest_impact_open_problem}</div>
            </div>
          )}
        </div>
      )}

      {tab==='claims'&&(
        <div>
          {Object.entries(byPaper).map(([pid,cls])=>(
            <div key={pid} style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:3,height:18,borderRadius:2,background:'var(--accent)'}}/>
                <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{pid}</span>
                <span style={{fontSize:10,color:'var(--dim)',fontFamily:"'DM Mono',monospace"}}>
                  {cls.length} claims
                </span>
              </div>
              {cls.map((c,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'8px 12px',
                  background:'var(--surface)',border:'1px solid var(--border)',
                  borderRadius:7,marginBottom:5,boxShadow:'var(--shadow)'}}>
                  <span style={{fontSize:10,color:'var(--dim)',fontFamily:"'DM Mono',monospace",
                    minWidth:20,flexShrink:0,paddingTop:1}}>{i+1}.</span>
                  <span style={{fontSize:12,color:'var(--text)',lineHeight:1.6}}>{c}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {tab==='explorer'&&(
        <div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12,
            padding:'10px 12px',background:'var(--surface2)',borderRadius:8,
            border:'1px solid var(--border)'}}>
            <span style={{fontSize:10,color:'var(--dim)',alignSelf:'center',marginRight:4}}>Filter:</span>
            {['agreement','contradiction','partial','novel'].map(r=>(
              <button key={r} onClick={()=>toggle(r)}
                style={{fontSize:10,padding:'3px 10px',borderRadius:20,cursor:'pointer',
                  fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:.06,
                  background:relFilter.includes(r)?REL_META[r].bg:'none',
                  color:relFilter.includes(r)?REL_META[r].color:'var(--dim)',
                  border:`1px solid ${relFilter.includes(r)?REL_META[r].border:'var(--border)'}`,
                  transition:'all .15s'}}>
                {REL_META[r].label}
              </button>
            ))}
            <span style={{marginLeft:'auto',fontSize:10,color:'var(--dim)',alignSelf:'center',
              fontFamily:"'DM Mono',monospace"}}>
              {filtered.length} shown
            </span>
          </div>
          {filtered.map((c,i)=><CompCard key={i} comp={c} idx={i}/>)}
          {filtered.length===0&&(
            <div style={{textAlign:'center',padding:'32px 0',color:'var(--dim)',fontSize:12}}>
              No comparisons match the selected filters.
            </div>
          )}
        </div>
      )}

      {tab==='insights'&&(
        <div>
          {['agreement','contradiction'].map(rel=>{
            const top=comps.filter(c=>c.relationship===rel)
              .sort((a,b)=>(b.confidence||0)-(a.confidence||0)).slice(0,4);
            if(!top.length)return null;
            const m=REL_META[rel];
            return(
              <div key={rel} style={{marginBottom:18}}>
                <div style={{fontSize:11,fontWeight:600,color:m.color,
                  letterSpacing:.08,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:2,background:m.dot}}/>
                  {rel==='agreement'?'STRONGEST AGREEMENTS':'KEY CONTRADICTIONS'}
                </div>
                {top.map((c,i)=>(
                  <div key={i} style={{background:'var(--surface)',border:`1px solid ${m.border}`,
                    borderLeft:`3px solid ${m.dot}`,borderRadius:8,padding:'10px 13px',
                    marginBottom:7,boxShadow:'var(--shadow)'}}>
                    <div style={{display:'flex',gap:8,marginBottom:6}}>
                      <RelChip type={rel}/>
                      <span style={{fontSize:10,color:'var(--dim)',fontFamily:"'DM Mono',monospace",alignSelf:'center'}}>
                        {c.papers?.join(' ↔ ')}
                      </span>
                      <span style={{marginLeft:'auto',fontSize:11,fontWeight:600,
                        color:'var(--accent)',fontFamily:"'DM Mono',monospace"}}>
                        {Math.round((c.confidence||0)*100)}%
                      </span>
                    </div>
                    <div style={{fontSize:12,color:'var(--text)',lineHeight:1.65,marginBottom:8}}>
                      {c.explanation}
                    </div>
                    {c.research_gap&&(
                      <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',
                        borderRadius:6,padding:'7px 10px',fontSize:11,color:'var(--accent)',lineHeight:1.55}}>
                        <strong>Research agenda:</strong> {c.research_gap}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            );
          })}
          <div>
            <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',letterSpacing:.08,
              marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:8,height:8,borderRadius:2,background:'var(--accent)'}}/>
              ALL RESEARCH AGENDA ITEMS
            </div>
            {[...new Set(comps.map(c=>c.research_gap).filter(Boolean))].map((g,i)=>(
              <div key={i} style={{display:'flex',gap:10,background:'var(--accent-soft)',
                border:'1px solid var(--accent-dim)',borderRadius:7,padding:'9px 12px',marginBottom:6}}>
                <span style={{fontSize:10,color:'var(--accent)',fontFamily:"'DM Mono',monospace",
                  fontWeight:600,minWidth:24,flexShrink:0}}>#{i+1}</span>
                <span style={{fontSize:11,color:'var(--ink)',lineHeight:1.6}}>{g}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── App ───────────────────────────────────────────────────────── */
function App(){
  const [apiKey,setApiKey]=useState('');
  const [showKey,setShowKey]=useState(false);
  const [papers,setPapers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('');
  const [progress,setProgress]=useState(0);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');

  const handleFiles=useCallback(async(files)=>{
    for(const file of files){
      setStatus(`Extracting text from ${file.name}…`);
      try{
        const text=await extractText(file);
        setPapers(p=>[...p.filter(x=>x.name!==file.name),{name:file.name,text,size:file.size}]);
      }catch(e){setError(`Failed to read ${file.name}: ${e.message}`);}
    }
    setStatus('');
  },[]);

  const runAnalysis=async()=>{
    if(!IS_LOCAL && !apiKey.trim()){setError('Please enter your Mistral API key.');return;}
    if(papers.length<2){setError('Please upload at least 2 papers to compare.');return;}
    setLoading(true);setError('');setResult(null);setProgress(0);
    try{
      if(IS_LOCAL){
        setStatus('Running Python backend analysis…');setProgress(20);
        const res=await runAnalysisBackend(papers);
        setProgress(90);
        setResult(res);
        setStatus('Analysis complete.');setProgress(100);
        setTimeout(()=>{setStatus('');setProgress(0);},2000);
      } else {
        setStatus('Constructing expert analytical prompt…');setProgress(15);
        setStatus('Sending to Mistral AI (mistral-large-latest)…');setProgress(35);
        const prompt=buildPrompt(papers);
        setProgress(50);
        const res=await callMistral(apiKey.trim(),prompt);
        setProgress(90);
        setResult(res);
        setStatus('Analysis complete.');setProgress(100);
        setTimeout(()=>{setStatus('');setProgress(0);},2000);
      }
    }catch(e){
      setError(e.message);setStatus('');setProgress(0);
    }finally{setLoading(false);}
  };

  const keyOk=apiKey.length>20;

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <style>{`
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .fade-up{animation:fadeUp .3s ease both}
        button:not(:disabled):hover{opacity:.85}
      `}</style>

      {/* ── Header ── */}
      <header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',
        padding:'0 28px',boxShadow:'0 1px 4px rgba(28,26,22,.06)'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:0,padding:'14px 0 10px'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,
                  color:'var(--text)',letterSpacing:-.3}}>Agent 4</span>
                <span style={{width:1,height:16,background:'var(--border)',display:'inline-block'}}/>
                <span style={{fontSize:14,color:'var(--muted)',fontWeight:400}}>
                  Agreement & Disagreement Analyst
                </span>
                <span style={{background:'var(--accent-soft)',color:'var(--accent)',fontSize:9,
                  fontWeight:600,padding:'2px 8px',borderRadius:4,
                  fontFamily:"'DM Mono',monospace",letterSpacing:.06}}>Expert</span>
              </div>
              <div style={{fontSize:10,color:'var(--dim)',marginTop:2}}>
                Claim extraction · Semantic comparison · Relationship classification · Cross-paper synthesis
              </div>
            </div>
            {/* API Key / Backend Mode */}
            {IS_LOCAL ? (
              <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--agree-bg)',
                border:'1px solid var(--agree-dim)',borderRadius:8,padding:'6px 14px'}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:'var(--agree)',
                  boxShadow:'0 0 6px var(--agree-dim)'}}/>
                <span style={{fontSize:11,color:'var(--agree)',fontWeight:600,
                  fontFamily:"'DM Mono',monospace"}}>LOCAL PYTHON BACKEND</span>
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Mistral API Key</label>
                <div style={{display:'flex',background:'var(--surface2)',border:'1px solid var(--border)',
                  borderRadius:8,overflow:'hidden',transition:'border-color .15s',
                  ...(keyOk?{borderColor:'var(--agree-dim)'}:{}) }}>
                  <input type={showKey?'text':'password'} value={apiKey}
                    onChange={e=>setApiKey(e.target.value)}
                    placeholder="Enter key…"
                    style={{background:'none',border:'none',padding:'7px 12px',color:'var(--text)',
                      fontSize:12,fontFamily:"'DM Mono',monospace",outline:'none',width:220}}/>
                  <button onClick={()=>setShowKey(s=>!s)}
                    style={{background:'none',border:'none',borderLeft:'1px solid var(--border)',
                      color:'var(--dim)',cursor:'pointer',padding:'0 10px',fontSize:13}}>
                    {showKey?'●':'○'}
                  </button>
                </div>
                <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                  background:keyOk?'var(--agree)':'#d1d5db',
                  boxShadow:keyOk?'0 0 6px var(--agree-dim)':'none',
                  transition:'all .3s'}}/>
              </div>
            )}
          </div>
          {progress>0&&(
            <div style={{height:2,background:'var(--bg3)',borderRadius:1,marginBottom:2}}>
              <div style={{height:'100%',background:'var(--accent)',borderRadius:1,
                width:`${progress}%`,transition:'width .4s ease'}}/>
            </div>
          )}
        </div>
      </header>

      {/* ── Body ── */}
      <main style={{flex:1,maxWidth:1100,margin:'0 auto',width:'100%',padding:'24px 28px'}}>
        <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:20,alignItems:'start'}}>

          {/* Left panel */}
          <div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,
              padding:'20px',boxShadow:'var(--shadow)',marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',letterSpacing:.08,marginBottom:12}}>
                UPLOAD PAPERS
              </div>
              <DropZone onFiles={handleFiles} disabled={loading}/>
              {papers.length>0&&(
                <div style={{marginTop:12}}>
                  <div style={{fontSize:10,color:'var(--dim)',marginBottom:6,letterSpacing:.06}}>
                    {papers.length} paper{papers.length!==1?'s':''} ready
                  </div>
                  {papers.map(p=>(
                    <FileRow key={p.name} paper={p}
                      onRemove={()=>setPapers(ps=>ps.filter(x=>x.name!==p.name))}/>
                  ))}
                </div>
              )}
              <div style={{marginTop:14,background:'var(--bg2)',border:'1px solid var(--border)',
                borderRadius:8,padding:'9px 12px',fontSize:10,color:'var(--dim)',lineHeight:1.6}}>
                <strong style={{color:'var(--muted)'}}>How it works:</strong> Files are parsed locally in your browser. Only extracted text is sent to Mistral AI for analysis. Supports PDF (up to 40 pages), LaTeX, and plain text.
              </div>
            </div>

            {status&&(
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',
                background:'var(--accent-soft)',border:'1px solid var(--accent-dim)',borderRadius:8,
                fontSize:11,color:'var(--accent)',marginBottom:12}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  strokeWidth="2" style={{animation:'spin 1s linear infinite',flexShrink:0}}>
                  <path d="M21 12a9 9 0 11-6.219-8.56"/>
                </svg>
                {status}
              </div>
            )}
            {error&&(
              <div style={{padding:'10px 14px',background:'var(--contra-bg)',
                border:'1px solid var(--contra-dim)',borderRadius:8,
                fontSize:11,color:'var(--contra)',lineHeight:1.55,marginBottom:12}}>
                <strong>Error:</strong> {error}
              </div>
            )}

            <button onClick={runAnalysis}
              disabled={loading||papers.length<2||(!IS_LOCAL&&!keyOk)}
              style={{width:'100%',padding:'13px',background:loading||(!IS_LOCAL&&!keyOk)||papers.length<2?'var(--bg3)':'var(--accent)',
                color:loading||(!IS_LOCAL&&!keyOk)||papers.length<2?'var(--dim)':'#fff',
                border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:loading||papers.length<2||(!IS_LOCAL&&!keyOk)?'not-allowed':'pointer',
                transition:'all .2s',boxShadow:(IS_LOCAL||keyOk)&&papers.length>=2&&!loading?'0 2px 12px rgba(29,58,110,.25)':'none',
                letterSpacing:.02}}>
              {loading?'Analysing…':papers.length<2?`Upload ≥2 Papers`:`Run Analysis · ${papers.length} Papers`}
            </button>

            <div style={{marginTop:12,background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:10,padding:'12px 14px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:9,color:'var(--dim)',letterSpacing:.08,marginBottom:8}}>AGENT CAPABILITIES</div>
              {[
                ['Claim Extraction','8–12 primary claims per paper'],
                ['Relationship Types','Agreement · Contradiction · Partial · Novel'],
                ['Scoring','Confidence + semantic similarity'],
                ['Expert Analysis','Rigorous peer-review-level reasoning'],
                ['Research Gaps','Actionable research agenda items'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',gap:8,marginBottom:6,fontSize:11}}>
                  <div style={{width:4,height:4,borderRadius:'50%',background:'var(--accent)',
                    marginTop:4,flexShrink:0}}/>
                  <span><strong style={{color:'var(--text)'}}>{k}</strong>
                    <span style={{color:'var(--muted)'}}> — {v}</span></span>
                </div>
              ))}
            </div>
          </div>

          {/* Right panel */}
          <div>
            {!result&&!loading&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                minHeight:400,background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:14,boxShadow:'var(--shadow)',padding:40,textAlign:'center'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg3)',
                  display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" strokeWidth="1.5">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                  </svg>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text)',
                  marginBottom:8}}>Ready to Analyse</div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.7,maxWidth:340}}>
                  Upload two or more research papers and run the analysis to discover agreements, contradictions, and research gaps across the corpus.
                </div>
              </div>
            )}
            {loading&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                minHeight:400,background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:14,boxShadow:'var(--shadow)',padding:40}}>
                <div style={{width:52,height:52,border:'2px solid var(--border)',
                  borderTop:'2px solid var(--accent)',borderRadius:'50%',
                  animation:'spin 1s linear infinite',marginBottom:20}}/>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:'var(--text)',marginBottom:6}}>
                  {status||'Analysing…'}
                </div>
                <div style={{fontSize:11,color:'var(--dim)'}}>
                  Mistral is performing expert-level inter-paper analysis
                </div>
              </div>
            )}
            {result&&<div className="fade-up"><Results result={result}/></div>}
          </div>
        </div>
      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'10px 28px',
        background:'var(--surface)',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:12,color:'var(--muted)'}}>Agent 4</span>
        <span style={{fontSize:11,color:'var(--dim)'}}>— Agreement & Disagreement Analyst · Research Intelligence System · Powered by Mistral AI</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
